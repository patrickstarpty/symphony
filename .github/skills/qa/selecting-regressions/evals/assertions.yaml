        value: "medium"
      - path: "selected_tests"
        type: "array_contains_id"
        value: "test-auth"

  - test_id: "sr-tc-003"
    checks:
      - path: "selected_count"
        type: "number_gte"
        value: 2
      - path: "confidence"
        type: "equals"
        value: "high"
      - path: "selected_tests"
        type: "array_contains_id"
        value: "payment-unit"
