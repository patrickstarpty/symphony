        value: 1
      - path: "confidence"
        type: "equals"
        value: "medium"

  - test_id: "hbt-tc-003"
    checks:
      - path: "unhealed_tests"
        type: "array_length"
        value: 1
      - path: "confidence"
        type: "equals"
        value: "low"
